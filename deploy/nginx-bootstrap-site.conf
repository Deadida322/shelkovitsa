# Фрагмент server { } для HTTP и Let's Encrypt (webroot).
# Замените YOUR_DOMAIN / www.YOUR_DOMAIN, затем:
#   sudo mkdir -p /var/www/certbot && sudo chown -R www-data:www-data /var/www/certbot
#   sudo cp deploy/nginx-bootstrap-site.conf /etc/nginx/sites-available/shelkovitsa-bootstrap
#   sudo ln -sf /etc/nginx/sites-available/shelkovitsa-bootstrap /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
	listen 80;
	listen [::]:80;
	server_name YOUR_DOMAIN www.YOUR_DOMAIN;

	location /.well-known/acme-challenge/ {
		root /var/www/certbot;
	}

	location / {
		return 200 'bootstrap';
		add_header Content-Type text/plain;
	}
}
